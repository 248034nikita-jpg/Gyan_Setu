<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyan Setu - Child Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- Navbar -->
    <header class="dashboard-navbar">
        <a href="index.html" class="logo">
            <img src="assets/images/logo.png" alt="Gyan Setu Logo" class="logo-img">
            <h2>ज्ञान Setu</h2>
        </a>
        <button class="menu-toggle" type="button">☰</button>
        <div class="nav-wrapper">
            <nav class="dashboard-menu">
                <a href="child-dashboard.html">🎮 Game Zone</a>
                <a href="progress.html">📈 My Progress</a>
                <a href="shop.html">🏪 Store</a>
                <a href="coins.html">💰 Coins</a>
            </nav>
            <div class="dashboard-right">
                <button class="language-btn">🌐 Language</button>
                <a href="profile.html" class="profile-icon">👤</a>
            </div>
        </div>
    </header>

    <!-- Main Dashboard  -->
    <main class="dashboard-container">

        <!-- Subject filter sidebar -->
        <aside class="subjects">
            <h2>Select Subject</h2>
            <button type="button">🧮 MATHS</button>
            <button type="button">📘 ENGLISH</button>
            <button type="button">📖 STORY BOOKS</button>
        </aside>

        <!-- Games list, locked games can be opened via Unlock All -->
        <section class="main-content">
            <button class="unlock-btn" type="button">🔓 Unlock All</button>

            <div class="games-grid">

                <a href="game1.html" class="game-link">
                    <div class="game-card active">
                        <div class="play-btn">▶</div>
                        <p>Defend The Tower</p>
                    </div>
                </a>

                <a href="game2.html" class="game-link">
                    <div class="game-card">
                        <div class="play-btn">▶</div>
                        <p>Word Matcher</p>
                    </div>
                </a>

                <a href="game3.html" class="game-link">
                    <div class="game-card">
                        <div class="play-btn">▶</div>
                        <p>Fraction Fruit</p>
                    </div>
                </a>

                <a href="game4.html" class="game-link">
                    <div class="game-card">
                        <div class="play-btn">▶</div>
                        <p>Sentence Builder</p>
                    </div>
                </a>

            </div>
        </section>
    </main>

    <!--  Footer  -->
    <footer class="dashboard-footer">
        © 2025 Gyan Setu. All rights reserved.
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
